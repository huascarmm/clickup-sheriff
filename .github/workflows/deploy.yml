name: CI/CD

# Tests en cada push/PR. Despliegue solo al hacer push a main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGION: us-central1
  SERVICE: llamadas-atencion-api

jobs:
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Instalar dependencias (API)
        run: npm ci

      - name: Typecheck (API)
        run: npm run typecheck

      - name: Tests unitarios
        run: npm run test:unit

      # Integracion + e2e contra el emulador de Firestore.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Instalar firebase-tools
        run: npm i -g firebase-tools

      - name: Integracion + e2e (emulador)
        run: |
          firebase emulators:exec \
            --only firestore \
            --project demo-llamadas \
            "npm run test:integration && npm run test:e2e"

      - name: Instalar dependencias (panel)
        working-directory: web
        run: npm ci

      - name: Typecheck + build (panel)
        working-directory: web
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
        run: |
          npm run typecheck
          npm run build

  # ---------------------------------------------------------------------------
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # para Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # --- Autenticacion con GCP ---
      # Opcion recomendada: Workload Identity Federation (sin claves en secretos).
      # Alternativa: pasar credentials_json con una clave de service account.
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # --- Deploy de la API a Cloud Run (build desde el Dockerfile) ---
      # Los secretos se leen de Secret Manager (creados una sola vez, ver README).
      - name: Deploy Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --allow-unauthenticated \
            --set-env-vars "^;^FIREBASE_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }};FIRESTORE_DATABASE_ID=llamadas-atencion;ADMIN_EMAILS=${{ vars.ADMIN_EMAILS }}" \
            --set-secrets "CLICKUP_TOKEN=CLICKUP_TOKEN:latest,SLACK_BOT_TOKEN=SLACK_BOT_TOKEN:latest,WEBHOOK_SECRET=WEBHOOK_SECRET:latest"

      # --- Deploy de reglas e indices de Firestore + panel (Hosting) ---
      - name: Instalar firebase-tools
        run: npm i -g firebase-tools

      - name: Build del panel
        working-directory: web
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
        run: |
          npm ci
          npm run build

      - name: Deploy Firestore (reglas e indices)
        run: |
          firebase deploy \
            --only firestore \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --non-interactive

      - name: Deploy Hosting (panel)
        run: |
          firebase deploy \
            --only hosting \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --non-interactive

      # --- Verificacion en vivo REAL tras el deploy ---
      # Crea una tarea de prueba en ClickUp, postea al canal de prueba de Slack,
      # verifica la cadena completa y limpia. Falla el deploy si la cadena falla.
      # Requiere testClickupListId/testSlackChannelId configurados en Settings.
      - name: Verificacion en vivo (post-deploy)
        run: |
          SECRET="$(gcloud secrets versions access latest --secret=WEBHOOK_SECRET --project "${{ secrets.GCP_PROJECT_ID }}")"
          URL="$(gcloud run services describe "$SERVICE" --region "$REGION" --project "${{ secrets.GCP_PROJECT_ID }}" --format='value(status.url)')"
          echo "Verificando ${URL}/internal/live-verify"
          HTTP=$(curl -s -o /tmp/verify.json -w "%{http_code}" -X POST \
            "${URL}/internal/live-verify" \
            -H "X-Webhook-Secret: ${SECRET}")
          echo "HTTP ${HTTP}"; cat /tmp/verify.json
          if [ "$HTTP" != "200" ]; then
            echo "::error::La verificacion en vivo fallo tras el despliegue."
            exit 1
          fi
